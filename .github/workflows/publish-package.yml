name: 📦 Publish Package

on:
  workflow_call:
    inputs:
      bump:
        description: "Version bump type (major, minor, patch, revision)"
        required: false
        default: "patch"
        type: string
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - revision
          - minor
          - major

permissions:
  contents: write

jobs:
  # ----------------------------------------
  # 🧩 Precheck
  # ----------------------------------------
  precheck:
    name: 🧮 Precheck
    runs-on: ubuntu-latest
    timeout-minutes: 3
    continue-on-error: true
    outputs:
      over_limit: ${{ steps.assume_ok.outputs.over_limit || 'false' }}

    steps:
      - name: 🔎 Owner info
        run: |
          echo "Repository:  ${{ github.repository }}"
          echo "Owner:       ${{ github.repository_owner }}"
          echo "Owner type:  ${{ github.event.repository.owner.type }}"

      - name: ✅ Assume under limit
        id: assume_ok
        run: |
          echo "User-owned repo; skipping org usage checks."
          echo "over_limit=false" >> "$GITHUB_OUTPUT"

  # ----------------------------------------
  # 🚀 Publish Package
  # ----------------------------------------
  publish-package:
    name: ${{ format('🚀 Publish Package {0}', needs.precheck.outputs.over_limit == 'true' && '(Self-Hosted)' || '(GitHub)') }}
    needs: precheck
    runs-on: ${{ needs.precheck.outputs.over_limit == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 15

    steps:
      - name: ⚙️ Configure Git
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 🧾 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🔢 Determine Version
        id: version
        uses: ./.github/actions/bump-version
        with:
          bump: ${{ inputs.bump }}

      - name: 🏗️ Build
        uses: ./.github/actions/build-node

      - name: 🧩 Sync Package Version
        shell: bash
        run: |
          TARGET="${{ steps.version.outputs.version }}"
          CURRENT="$(node -p "require('./package.json').version")"

          if [[ "$CURRENT" != "$TARGET" ]]; then
            echo "📦 Updating package.json: $CURRENT → $TARGET"
            npm version "$TARGET" --no-git-tag-version
            git add package.json package-lock.json
            git commit \
              -m "bump: v${TARGET}" \
              -m "[skip ci]" \
              -m "Source: ${GITHUB_REPOSITORY}@${GITHUB_SHA} via ${GITHUB_WORKFLOW} (run ${GITHUB_RUN_NUMBER})"
          else
            echo "✅ Version already at ${TARGET}; skipping commit."
          fi

      - name: 📦 Package VSIX
        shell: bash
        run: npm run package

      - name: 📤 Push version bump
        shell: bash
        run: git push origin HEAD:${{ github.ref_name }}

      - name: 🏷️ Tag & Publish Release
        uses: ./.github/actions/publish-github-release
        with:
          version: ${{ steps.version.outputs.version }}
          gh-token: ${{ secrets.GH_TOKEN || github.token }}
          files: prompt-fuel-*.vsix
          title: "📦 ${{ github.event.repository.name }}"

      - name: 🧹 Cleanup Runner
        if: always()
        uses: ./.github/actions/cleanup-runner
