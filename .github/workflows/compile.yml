name: ⚙️ Compile

on:
  workflow_call:
  workflow_dispatch:

jobs:
  # ----------------------------------------
  # 🏗️ Compile, test & smoke
  # ----------------------------------------
  compile:
    name: ⚙️ Compile, Test & Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 🧾 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 🏗️ Build
        uses: ./.github/actions/build-node

      - name: 🧪 Unit tests
        shell: bash
        run: npm run test:unit

      - name: 🏪 Smoke suite
        shell: bash
        run: npm run smoke:ci
