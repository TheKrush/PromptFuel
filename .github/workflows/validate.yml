name: 🧪 Validate

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'src/**'
      - 'scripts/**'
      - '.github/workflows/**'
      - '.vscodeignore'
  pull_request:
    branches: [master]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'src/**'
      - 'scripts/**'
      - '.github/workflows/**'
      - '.vscodeignore'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run compile

      - run: npm run validate:manifest

      - run: npm run package
