name: 🧪 Validate

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'src/**'
      - 'scripts/**'
      - '.github/workflows/**'
      - '.github/scripts/**'
      - '.vscodeignore'
  pull_request:
    branches: [master]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'src/**'
      - 'scripts/**'
      - '.github/workflows/**'
      - '.github/scripts/**'
      - '.vscodeignore'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - id: paths
        run: |
          CHANGED="$(git diff --name-only HEAD~1 2>/dev/null || true)"
          CHANGED="$(echo "$CHANGED" | tr '\n' ' ')"
          echo "changed_files=$CHANGED" >> "$GITHUB_OUTPUT"

      - id: controller
        env:
          CHANGED_FILES: ${{ steps.paths.outputs.changed_files }}
        run: node .github/scripts/workflow-controller.cjs

      - if: steps.controller.outputs.run_compile == 'true' || steps.controller.outputs.run_package == 'true'
        run: npm ci

      - if: steps.controller.outputs.run_compile == 'true'
        run: npm run compile

      - if: steps.controller.outputs.run_manifest == 'true'
        run: npm run validate:manifest

      - if: steps.controller.outputs.run_package == 'true'
        run: npm run package
